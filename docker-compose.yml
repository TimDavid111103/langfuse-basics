services:
  # ── Application database ───────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: pensive
      POSTGRES_PASSWORD: pensive
      POSTGRES_DB: pensive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pensive -d pensive"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
